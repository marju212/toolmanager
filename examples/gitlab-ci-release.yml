# Example GitLab CI jobs for release.sh, deploy.sh, and bundle.sh.
#
# Prerequisites:
#   - Python 3.12+ must be available in the CI image.
#   - Set DEPLOY_BASE_PATH as a CI/CD variable (Settings > CI/CD > Variables).
#   - Ensure the CI runner has write access to DEPLOY_BASE_PATH on the target host.
#
# Trigger jobs manually from the GitLab UI by setting the appropriate variable:
#   RELEASE_VERSION   e.g. 1.2.3   (triggers release or bundle-release)
#   DEPLOY_VERSION    e.g. 1.2.3   (triggers deploy or bundle-deploy)

# ── Tool Repo Jobs ──────────────────────────────────────────────────────

release:
  stage: deploy
  image: python:3.12-alpine
  variables:
    GIT_DEPTH: 0  # Full history needed for changelog generation
  before_script:
    - apk add --no-cache git
    - git fetch --unshallow 2>/dev/null || true
    - git fetch --tags
    - git config user.name "GitLab CI"
    - git config user.email "ci@${CI_SERVER_HOST}"
  script:
    - ./scripts/release.sh --version "$RELEASE_VERSION" --non-interactive
  rules:
    - if: '$RELEASE_VERSION'
      when: manual
  allow_failure: false

deploy:
  stage: deploy
  image: python:3.12-alpine
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
    - git fetch --unshallow 2>/dev/null || true
    - git fetch --tags
  script:
    - ./scripts/deploy.sh --version "$DEPLOY_VERSION"
        --deploy-path "$DEPLOY_BASE_PATH" --non-interactive
  rules:
    - if: '$DEPLOY_VERSION'
      when: manual
  allow_failure: false

# ── Toolset / Bundle Repo Jobs ──────────────────────────────────────────

bundle-release:
  stage: deploy
  image: python:3.12-alpine
  variables:
    GIT_DEPTH: 0
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - apk add --no-cache git
    - git fetch --unshallow 2>/dev/null || true
    - git fetch --tags
    - git config user.name "GitLab CI"
    - git config user.email "ci@${CI_SERVER_HOST}"
  script:
    - ./scripts/bundle.sh --version "$RELEASE_VERSION"
        --deploy-path "$DEPLOY_BASE_PATH" --non-interactive
  rules:
    - if: '$RELEASE_VERSION'
      when: manual
  allow_failure: false

bundle-deploy:
  stage: deploy
  image: python:3.12-alpine
  variables:
    GIT_DEPTH: 0
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - apk add --no-cache git
    - git fetch --unshallow 2>/dev/null || true
    - git fetch --tags
  script:
    - ./scripts/bundle.sh --deploy-only --version "$DEPLOY_VERSION"
        --deploy-path "$DEPLOY_BASE_PATH" --non-interactive
  rules:
    - if: '$DEPLOY_VERSION'
      when: manual
  allow_failure: false
