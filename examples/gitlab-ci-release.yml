# Example GitLab CI jobs for release.sh, deploy.sh, and bundle.sh.
#
# Prerequisites:
#   - Set GITLAB_TOKEN as a CI/CD variable (Settings > CI/CD > Variables)
#     with api scope. Mark it as "Masked" and optionally "Protected".
#   - Python 3.12+ must be available in the CI image.
#
# Trigger jobs manually from the GitLab UI by setting the appropriate variable.

# ── Tool Repo Jobs ──────────────────────────────────────────────────────

release:
  stage: deploy
  image: python:3.12-alpine
  variables:
    GIT_DEPTH: 0  # Full history needed for changelog generation
  before_script:
    - apk add --no-cache git
    - git fetch --unshallow 2>/dev/null || true
    - git fetch --tags
    - git config user.name "GitLab CI"
    - git config user.email "ci@${CI_SERVER_HOST}"
  script:
    - ./scripts/release.sh --version "$RELEASE_VERSION" --non-interactive
  rules:
    - if: '$RELEASE_VERSION'
      when: manual
  allow_failure: false

hotfix-mr:
  stage: deploy
  image: python:3.12-alpine
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
    - git fetch --unshallow 2>/dev/null || true
    - git fetch --tags
  script:
    - ./scripts/release.sh --hotfix-mr "$HOTFIX_BRANCH" --non-interactive
  rules:
    - if: '$HOTFIX_BRANCH'
      when: manual
  allow_failure: false

deploy:
  stage: deploy
  image: python:3.12-alpine
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
    - git fetch --unshallow 2>/dev/null || true
    - git fetch --tags
  script:
    - ./scripts/deploy.sh --version "$DEPLOY_VERSION"
        --deploy-path /opt/software --non-interactive
  rules:
    - if: '$DEPLOY_VERSION'
      when: manual
  allow_failure: false

# ── Toolset Repo Jobs ───────────────────────────────────────────────────

bundle-release:
  stage: deploy
  image: python:3.12-alpine
  variables:
    GIT_DEPTH: 0
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - apk add --no-cache git
    - git fetch --unshallow 2>/dev/null || true
    - git fetch --tags
    - git config user.name "GitLab CI"
    - git config user.email "ci@${CI_SERVER_HOST}"
  script:
    - ./scripts/bundle.sh --version "$RELEASE_VERSION"
        --deploy-path /opt/software --non-interactive
  rules:
    - if: '$RELEASE_VERSION'
      when: manual
  allow_failure: false

bundle-deploy:
  stage: deploy
  image: python:3.12-alpine
  variables:
    GIT_DEPTH: 0
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - apk add --no-cache git
    - git fetch --unshallow 2>/dev/null || true
    - git fetch --tags
  script:
    - ./scripts/bundle.sh --deploy-only --version "$DEPLOY_VERSION"
        --deploy-path /opt/software --non-interactive
  rules:
    - if: '$DEPLOY_VERSION'
      when: manual
  allow_failure: false
